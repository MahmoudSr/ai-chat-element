<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ai-chat-element — playground</title>
    <style>
      :root {
        --pg-bg: #f6f7f9;
        --pg-panel: #fff;
        --pg-ink: #16181d;
        --pg-soft: #6b7280;
        --pg-line: #e5e7eb;
        --pg-brand: #4f46e5;
        --pg-font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        --pg-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      [data-pg="dark"] {
        --pg-bg: #0a0c10;
        --pg-panel: #12151b;
        --pg-ink: #e6e8ec;
        --pg-soft: #9099a8;
        --pg-line: #232830;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: var(--pg-font);
        background: var(--pg-bg);
        color: var(--pg-ink);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ---------- top bar ---------- */
      .bar {
        flex: none;
        display: flex; align-items: center; gap: 12px;
        padding: 0 14px; height: 50px;
        background: var(--pg-panel);
        border-bottom: 1px solid var(--pg-line);
      }
      .bar h1 {
        margin: 0; font-size: 14px; font-weight: 650; letter-spacing: -0.01em;
        display: flex; align-items: center; gap: 8px;
      }
      .bar h1 code {
        font-family: var(--pg-mono); font-size: 12px; font-weight: 500;
        background: var(--pg-bg); border: 1px solid var(--pg-line);
        padding: 2px 6px; border-radius: 5px; color: var(--pg-soft);
      }
      .bar__spacer { flex: 1; }
      .bar__note { font-size: 11.5px; color: var(--pg-soft); }

      /* ---------- layout ---------- */
      .wrap { flex: 1; display: flex; min-height: 0; }
      .panel {
        flex: none; width: 320px;
        background: var(--pg-panel);
        border-right: 1px solid var(--pg-line);
        overflow-y: auto;
        padding-bottom: 40px;
      }
      .stage {
        flex: 1; min-width: 0;
        display: flex; flex-direction: column;
        padding: 16px; gap: 10px;
      }
      .frame {
        flex: 1; min-height: 0;
        display: flex;
        background: var(--pg-panel);
        border: 1px solid var(--pg-line);
      }
      ai-chat { flex: 1; min-height: 0; }

      /* ---------- panel widgets ---------- */
      details.group { border-bottom: 1px solid var(--pg-line); }
      details.group > summary {
        cursor: pointer; user-select: none;
        padding: 11px 14px;
        font-size: 12px; font-weight: 650; letter-spacing: 0.04em;
        text-transform: uppercase; color: var(--pg-soft);
        display: flex; align-items: center; gap: 7px;
        list-style: none;
      }
      details.group > summary::-webkit-details-marker { display: none; }
      details.group > summary::before {
        content: "▸"; font-size: 9px; transition: transform 0.12s ease;
      }
      details.group[open] > summary::before { transform: rotate(90deg); }
      details.group > summary:hover { color: var(--pg-ink); }
      .group__body { padding: 2px 14px 14px; display: grid; gap: 9px; }

      .row { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 8px; }
      .row > label { font-size: 12.5px; color: var(--pg-ink); }
      .row--stack { grid-template-columns: 1fr; gap: 4px; }
      .hint { font-size: 11px; color: var(--pg-soft); line-height: 1.4; margin: -3px 0 2px; }
      .mono { font-family: var(--pg-mono); font-size: 10.5px; color: var(--pg-soft); }

      input[type="text"], select, textarea {
        font: inherit; font-size: 12.5px;
        padding: 5px 7px; width: 100%;
        border: 1px solid var(--pg-line); border-radius: 6px;
        background: var(--pg-bg); color: var(--pg-ink);
      }
      textarea { resize: vertical; min-height: 54px; font-family: var(--pg-mono); font-size: 11.5px; }
      input[type="range"] { width: 118px; accent-color: var(--pg-brand); }
      input[type="color"] {
        width: 30px; height: 24px; padding: 0; border: 1px solid var(--pg-line);
        border-radius: 5px; background: none; cursor: pointer;
      }
      input[type="checkbox"] { accent-color: var(--pg-brand); width: 15px; height: 15px; cursor: pointer; }
      .val { font-family: var(--pg-mono); font-size: 10.5px; color: var(--pg-soft); min-width: 42px; text-align: right; }
      .num { display: flex; align-items: center; gap: 7px; }

      button.act {
        font: inherit; font-size: 12px;
        padding: 6px 9px; cursor: pointer;
        border: 1px solid var(--pg-line); border-radius: 6px;
        background: var(--pg-bg); color: var(--pg-ink);
        text-align: left;
      }
      button.act:hover { border-color: var(--pg-brand); color: var(--pg-brand); }
      .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
      .btn-grid--3 { grid-template-columns: 1fr 1fr 1fr; }

      .status { font-size: 11px; margin-top: 2px; min-height: 14px; }
      .status.ok { color: #0d9488; }
      .status.err { color: #dc2626; }

      .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
      .preset {
        cursor: pointer; text-align: left;
        border: 1px solid var(--pg-line); border-radius: 7px;
        padding: 7px 8px; background: var(--pg-bg);
        font: inherit; font-size: 11.5px; color: var(--pg-ink);
      }
      .preset:hover { border-color: var(--pg-brand); }
      .preset b { display: block; font-size: 12px; font-weight: 600; margin-bottom: 1px; }
      .preset span { color: var(--pg-soft); font-size: 10.5px; }
      .swatches { display: flex; gap: 3px; margin-top: 5px; }
      .swatches i { width: 11px; height: 11px; border-radius: 3px; border: 1px solid rgba(0,0,0,.12); }

      /* ---------- the code export drawer ---------- */
      .drawer {
        flex: none; background: var(--pg-panel);
        border: 1px solid var(--pg-line); border-radius: 8px;
        overflow: hidden;
      }
      .drawer > summary {
        cursor: pointer; user-select: none; list-style: none;
        padding: 8px 12px; font-size: 12px; font-weight: 600;
        display: flex; align-items: center; gap: 8px; color: var(--pg-soft);
      }
      .drawer > summary::-webkit-details-marker { display: none; }
      .drawer > summary::before { content: "▸"; font-size: 9px; }
      .drawer[open] > summary::before { content: "▾"; }
      .drawer[open] > summary { border-bottom: 1px solid var(--pg-line); color: var(--pg-ink); }
      .drawer__body { padding: 10px 12px; }
      .drawer pre {
        margin: 0; max-height: 190px; overflow: auto;
        font-family: var(--pg-mono); font-size: 11px; line-height: 1.55;
        color: var(--pg-ink); background: var(--pg-bg);
        border: 1px solid var(--pg-line); border-radius: 6px; padding: 9px 11px;
        white-space: pre; tab-size: 2;
      }
      .drawer__foot { display: flex; gap: 6px; margin-top: 8px; align-items: center; }
      .drawer__hint { font-size: 11px; color: var(--pg-soft); flex: 1; }

      /* ---------- slot demo content ---------- */
      .demo-avatar {
        width: 100%; height: 100%; border-radius: inherit;
        display: grid; place-items: center;
        font-size: 10.5px; font-weight: 700; letter-spacing: .02em;
        background: var(--ai-chat-accent); color: var(--ai-chat-accent-fg);
      }
      .demo-avatar--user { background: #475569; }
      .demo-head { display: flex; align-items: center; gap: 8px; width: 100%; }
      .demo-head b { font-size: 13px; }
      .demo-head span { font-size: 11px; color: var(--ai-chat-muted); }
      .demo-head__sp { flex: 1; }
      .demo-cbtn {
        display: inline-grid; place-items: center; width: 28px; height: 28px;
        border: none; background: transparent; cursor: pointer;
        color: var(--ai-chat-muted); border-radius: 50%;
      }
      .demo-cbtn:hover { background: var(--ai-chat-assistant-bg); color: var(--ai-chat-fg); }

      /* consumer-owned history list */
      .h-item { display: flex; align-items: center; border-radius: 7px; margin-bottom: 2px; }
      .h-item:hover { background: color-mix(in srgb, var(--ai-chat-fg) 6%, transparent); }
      .h-item[aria-current="true"] { background: color-mix(in srgb, var(--ai-chat-accent) 15%, transparent); }
      .h-open {
        flex: 1; min-width: 0; text-align: left;
        padding: 7px 4px 7px 9px; border: none; background: none; cursor: pointer;
        color: var(--ai-chat-fg); font: inherit; font-size: 12.5px;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap; border-radius: 7px;
      }
      .h-del {
        flex: none; border: none; background: none; cursor: pointer;
        color: var(--ai-chat-muted); padding: 4px; margin-right: 4px;
        border-radius: 4px; opacity: 0; display: grid; place-items: center;
      }
      .h-item:hover .h-del, .h-del:focus-visible { opacity: 1; }
      .h-del:hover { color: #dc2626; }
      .h-empty { font-size: 11.5px; color: var(--ai-chat-muted); padding: 10px 9px; line-height: 1.45; margin: 0; }

      /* ---------- confirm dialog ---------- */
      .dlg {
        border: 1px solid var(--pg-line);
        border-radius: 12px;
        padding: 0;
        background: var(--pg-panel);
        color: var(--pg-ink);
        max-width: 340px;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.22);
      }
      .dlg::backdrop { background: rgba(8, 10, 14, 0.45); }
      .dlg form { padding: 18px; }
      .dlg h2 { margin: 0 0 6px; font-size: 15px; letter-spacing: -0.01em; }
      .dlg p {
        margin: 0 0 16px; font-size: 13px; line-height: 1.5;
        color: var(--pg-soft);
        overflow-wrap: anywhere;   /* a long chat title must not blow out the box */
      }
      .dlg__row { display: flex; justify-content: flex-end; gap: 8px; }
      .dlg__btn {
        font: inherit; font-size: 12.5px; cursor: pointer;
        padding: 7px 13px; border-radius: 7px;
        border: 1px solid var(--pg-line);
        background: var(--pg-bg); color: var(--pg-ink);
      }
      .dlg__btn:hover { border-color: var(--pg-soft); }
      .dlg__btn--danger {
        background: #dc2626; border-color: #dc2626; color: #fff; font-weight: 550;
      }
      .dlg__btn--danger:hover { background: #b91c1c; border-color: #b91c1c; }

      @media (max-width: 900px) {
        .wrap { flex-direction: column; }
        .panel { width: 100%; max-height: 44vh; border-right: none; border-bottom: 1px solid var(--pg-line); }
      }
    </style>
  </head>
  <body>
    <div class="bar">
      <h1><code>&lt;ai-chat&gt;</code> playground</h1>
      <span class="bar__note" id="pkgNote">every attribute, CSS variable, label &amp; slot — live</span>
      <div class="bar__spacer"></div>
      <button class="act" id="pgTheme" title="Toggle the page theme (not the component's)">Page theme</button>
    </div>

    <!-- Confirm dialog for deleting a conversation. Native <dialog> gives us the
         backdrop, Esc-to-close and focus trapping for free — no library. This is
         the CONSUMER's chrome: the component owns one conversation and knows
         nothing about a list, so the delete flow belongs here, in your app. -->
    <dialog id="confirmDlg" class="dlg">
      <form method="dialog">
        <h2 id="dlgTitle">Delete conversation?</h2>
        <p id="dlgBody">This can't be undone.</p>
        <div class="dlg__row">
          <button value="cancel" class="dlg__btn">Cancel</button>
          <button value="ok" class="dlg__btn dlg__btn--danger" id="dlgOk">Delete</button>
        </div>
      </form>
    </dialog>

    <div class="wrap">
      <aside class="panel" id="panel"><!-- controls injected --></aside>

      <main class="stage">
        <div class="frame" id="frame">
          <ai-chat id="chat" theme="light" placeholder="Ask me anything…">
            <div slot="aside" id="histList"></div>
          </ai-chat>
        </div>

        <details class="drawer" id="drawer">
          <summary>Generated code — copy this into your app</summary>
          <div class="drawer__body">
            <pre id="codeOut"></pre>
            <div class="drawer__foot">
              <span class="drawer__hint">Only what you changed from the defaults.</span>
              <button class="act" id="copyCode">Copy</button>
            </div>
          </div>
        </details>
      </main>
    </div>

    <script type="module">
      import '../src/index.ts';
      import { openAIAdapter, functionAdapter } from '../src/adapters/index.ts';
      import { SCENARIOS } from './scenarios.js';
      import { CONTROLS, PRESETS, buildPanel } from './controls.js';

      const chat = document.getElementById('chat');
      const frame = document.getElementById('frame');
      const $ = (id) => document.getElementById(id);

      /* =====================================================================
         STATE — the single source of truth. Everything (the element, the
         generated code, the presets) derives from this, so the panel and the
         exported snippet can never disagree.
         ===================================================================== */
      const state = {};          // only non-default values live here
      const DEFAULTS = {};
      for (const c of CONTROLS) DEFAULTS[c.key] = c.def;

      const get = (k) => (k in state ? state[k] : DEFAULTS[k]);
      const isSet = (k) => k in state && String(state[k]) !== String(DEFAULTS[k]);

      function set(k, v) {
        if (v === null || String(v) === String(DEFAULTS[k])) delete state[k];
        else state[k] = v;
        apply();
      }

      /* =====================================================================
         APPLY — push state onto the element.
         ===================================================================== */
      function apply() {
        for (const c of CONTROLS) {
          const v = get(c.key);
          if (c.kind === 'var') {
            if (isSet(c.key)) chat.style.setProperty(c.key, c.fmt ? c.fmt(v) : v);
            else chat.style.removeProperty(c.key);
          } else if (c.kind === 'attr') {
            if (c.type === 'bool') {
              // Booleans that default ON must be written as ="false" to turn off.
              if (c.def === true) v ? chat.removeAttribute(c.key) : chat.setAttribute(c.key, 'false');
              else v ? chat.setAttribute(c.key, '') : chat.removeAttribute(c.key);
            } else if (String(v ?? '').trim() === '') chat.removeAttribute(c.key);
            else chat.setAttribute(c.key, v);
          } else if (c.kind === 'frame') {
            frame.style[c.css] = c.fmt ? c.fmt(v) : v;
          }
        }
        // Labels are a property, not attributes — rebuild the whole object.
        const labels = {};
        for (const c of CONTROLS) if (c.kind === 'label' && isSet(c.key)) labels[c.key] = get(c.key);
        chat.labels = labels;

        renderSlots();
        renderCode();
      }

      /* =====================================================================
         SLOTS — toggled on/off so every slot in the API is testable.
         ===================================================================== */
      const SLOT_HTML = {
        'assistant-avatar': '<span slot="assistant-avatar" class="demo-avatar">AI</span>',
        'user-avatar': '<span slot="user-avatar" class="demo-avatar demo-avatar--user">ME</span>',
        header: `<div slot="header" class="demo-head">
            <b>Custom header slot</b><span>— replaces the whole bar</span>
            <span class="demo-head__sp"></span>
            <select><option>gpt-4o-mini</option><option>llama3.2</option></select>
          </div>`,
        'composer-actions-start': `<button slot="composer-actions-start" class="demo-cbtn" title="Attach (demo)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.4 11.05 12.25 20.2a6 6 0 0 1-8.49-8.49l9.2-9.19a4 4 0 0 1 5.65 5.66l-9.2 9.19a2 2 0 1 1-2.83-2.83l8.49-8.48"/></svg>
          </button>`,
        'composer-actions-end': `<button slot="composer-actions-end" class="demo-cbtn" title="Mic (demo)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v3"/></svg>
          </button>`,
        'send-icon': '<span slot="send-icon" style="font-size:13px;font-weight:700">GO</span>',
        'empty-icon': '<span slot="empty-icon" style="font-size:30px">💬</span>',
      };

      function renderSlots() {
        for (const [name, html] of Object.entries(SLOT_HTML)) {
          const existing = chat.querySelector(`[slot="${name}"]`);
          const want = get('slot:' + name);
          if (want && !existing) chat.insertAdjacentHTML('beforeend', html);
          else if (!want && existing) existing.remove();
        }
      }

      /* =====================================================================
         TRANSPORTS
         ===================================================================== */
      let scenario = 'normal';
      let pendingFail = false;

      const mock = functionAdapter(async function* (messages, signal) {
        const fn = SCENARIOS[pendingFail ? 'error' : scenario] ?? SCENARIOS.normal;
        pendingFail = false;
        yield* fn(messages, signal);
      });

      /**
       * Transport status lives in state, NOT written straight to the DOM.
       * Selecting a transport rebuilds the control panel, which destroys the
       * status element — an async probe that captured it would then write into
       * an orphaned node and the user would see nothing. The panel renders from
       * `transportStatus` instead, so a late result still shows up.
       */
      let transportStatus = { text: '', kind: '' };
      function setStatus(text, kind = '') {
        transportStatus = { text, kind };
        const el = $('transportStatus');   // re-query: may be a fresh element
        if (el) { el.textContent = text; el.className = 'status ' + kind; }
      }

      // Browsers block an HTTPS page from reaching http://localhost (mixed
      // content + private-network protection). Nothing the page or Ollama can
      // do about it, so say so plainly rather than "try starting the server".
      const isHttps = location.protocol === 'https:';

      function setTransport() {
        const kind = get('transport');
        if (kind === 'ollama') {
          chat.transport = openAIAdapter({
            model: get('ollamaModel') || 'llama3.2',
            baseURL: 'http://localhost:11434/v1/chat/completions',
            params: { temperature: 0.4 },
          });
          if (isHttps) {
            setStatus(
              'This page is served over HTTPS, and browsers block HTTPS pages from ' +
              'reaching http://localhost — so Ollama can\'t be used here even if it\'s running. ' +
              'Clone the repo and run `npm run dev` to try a real local model.',
              'err',
            );
            return;
          }
          probeOllama();
        } else {
          chat.transport = mock;
          setStatus('Mock transport — no setup needed.', 'ok');
        }
      }

      async function probeOllama() {
        setStatus('Checking Ollama…');
        try {
          const r = await fetch('http://localhost:11434/api/tags');
          const { models } = await r.json();
          const names = models.map((m) => m.model);
          setStatus(names.length ? `Online — ${names.join(', ')}` : 'Online, but no models pulled.', 'ok');
        } catch {
          setStatus(
            'Not reachable. Start it with:  $env:OLLAMA_ORIGINS="*"; ollama serve',
            'err',
          );
        }
      }

      /* =====================================================================
         CODE EXPORT — the payoff: whatever you tweak, you can paste out.
         ===================================================================== */
      function renderCode() {
        const attrs = [], vars = [], labels = [], slots = [];
        for (const c of CONTROLS) {
          if (!isSet(c.key)) continue;
          const v = get(c.key);
          if (c.kind === 'attr') {
            if (c.type === 'bool') attrs.push(c.def === true ? `${c.key}="false"` : c.key);
            else attrs.push(`${c.key}="${String(v).replace(/"/g, '&quot;')}"`);
          } else if (c.kind === 'var') vars.push(`  ${c.key}: ${c.fmt ? c.fmt(v) : v};`);
          else if (c.kind === 'label') labels.push(`  ${c.key}: ${JSON.stringify(v)},`);
        }
        for (const name of Object.keys(SLOT_HTML)) {
          if (get('slot:' + name)) slots.push('  ' + SLOT_HTML[name].trim().split('\n')[0].trim());
        }

        let out = '';
        if (vars.length) out += `/* CSS */\nai-chat {\n${vars.join('\n')}\n}\n\n`;
        out += `<!-- HTML -->\n<ai-chat${attrs.length ? '\n  ' + attrs.join('\n  ') + '\n' : ' '}>`;
        out += slots.length ? '\n' + slots.join('\n') + '\n</ai-chat>' : '</ai-chat>';

        out += `\n\n// JS\nimport 'ai-chat-element';\nimport { ${
          get('transport') === 'ollama' ? 'openAIAdapter' : 'functionAdapter'
        } } from 'ai-chat-element';\n\nconst chat = document.querySelector('ai-chat');\n`;
        out += get('transport') === 'ollama'
          ? `chat.transport = openAIAdapter({\n  model: '${get('ollamaModel') || 'llama3.2'}',\n  baseURL: 'http://localhost:11434/v1/chat/completions',\n});\n`
          : `chat.transport = functionAdapter(async function* (messages, signal) {\n  // stream text chunks from your backend\n});\n`;
        if (labels.length) out += `\nchat.labels = {\n${labels.join('\n')}\n};\n`;

        $('codeOut').textContent = out;
      }

      /* =====================================================================
         CONFIRM DIALOG — promise-wrapped <dialog> so callers read like confirm()
         without the native popup. Returns true only on an explicit Delete;
         Esc, the backdrop and Cancel all resolve false.
         ===================================================================== */
      const dlg = $('confirmDlg');
      function confirmDelete(title) {
        $('dlgTitle').textContent = 'Delete conversation?';
        $('dlgBody').textContent = `"${title}" and its messages will be permanently removed.`;
        dlg.showModal();
        $('dlgOk').focus();
        return new Promise((resolve) => {
          dlg.addEventListener('close', () => resolve(dlg.returnValue === 'ok'), { once: true });
        });
      }

      /* =====================================================================
         HISTORY (consumer-owned — the component holds ONE conversation)
         ===================================================================== */
      const histList = $('histList');
      let convos = [{ id: 1, title: 'Getting started', messages: [] }];
      let activeId = 1;

      const titleOf = (msgs) => {
        const f = msgs.find((m) => m.role === 'user');
        return f ? (f.content.length > 30 ? f.content.slice(0, 30).trim() + '…' : f.content) : 'New chat';
      };
      const commit = () => {
        const c = convos.find((x) => x.id === activeId);
        if (!c) return;
        c.messages = [...chat.messages];
        if (c.title === 'New chat') c.title = titleOf(c.messages);
      };

      function drawHist() {
        histList.innerHTML = '';
        if (!convos.length) {
          histList.innerHTML = '<p class="h-empty">No conversations. Send a message to start one.</p>';
          return;
        }
        for (const c of convos) {
          const row = document.createElement('div');
          row.className = 'h-item';
          row.setAttribute('aria-current', String(c.id === activeId));
          const open = document.createElement('button');
          open.type = 'button'; open.className = 'h-open'; open.textContent = c.title;
          open.onclick = () => {
            commit(); activeId = c.id;
            chat.messages = [...(convos.find((x) => x.id === c.id)?.messages ?? [])];
            drawHist();
          };
          const del = document.createElement('button');
          del.type = 'button'; del.className = 'h-del';
          del.setAttribute('aria-label', `Delete ${c.title}`);
          del.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>';
          del.onclick = async () => {
            if (!(await confirmDelete(c.title))) return;
            convos = convos.filter((x) => x.id !== c.id);
            if (activeId === c.id) {
              activeId = convos[0]?.id ?? null;
              chat.messages = activeId ? [...convos[0].messages] : [];
            }
            drawHist();
          };
          row.append(open, del);
          histList.appendChild(row);
        }
      }

      chat.addEventListener('ai-chat:new-chat', (e) => {
        const c = convos.find((x) => x.id === activeId);
        if (c) { c.messages = e.detail.messages; if (c.title === 'New chat') c.title = titleOf(c.messages); }
        const id = Date.now();
        convos.unshift({ id, title: 'New chat', messages: [] });
        activeId = id;
        drawHist();
      });
      chat.addEventListener('ai-chat:message', () => { commit(); drawHist(); });
      chat.addEventListener('ai-chat:submit', () => {
        if (!activeId) { const id = Date.now(); convos.unshift({ id, title: 'New chat', messages: [] }); activeId = id; }
        commit(); drawHist();
      });

      /* =====================================================================
         EVENT LOG — see what your app would receive.
         ===================================================================== */
      const logLines = [];
      function logEvent(name, detail) {
        const t = new Date().toLocaleTimeString([], { hour12: false });
        let d = '';
        if (detail?.content) d = JSON.stringify(detail.content.slice(0, 40));
        else if (detail?.message) {
          const m = detail.message;
          const extra = [
            m.finishReason ? `finish:${m.finishReason}` : null,
            m.usage ? `tokens:${m.usage.inputTokens ?? '?'}/${m.usage.outputTokens ?? '?'}` : null,
          ].filter(Boolean).join(', ');
          d = `{role:"${m.role}", ${m.content.length} chars${extra ? ', ' + extra : ''}}`;
        }
        else if (detail?.error) d = JSON.stringify(String(detail.error).slice(0, 40));
        else if (detail?.messages) d = `${detail.messages.length} messages`;
        logLines.unshift(`${t}  ${name}  ${d}`);
        logLines.length = Math.min(logLines.length, 40);
        const el = $('eventLog');
        if (el) el.textContent = logLines.join('\n') || 'No events yet.';
      }
      for (const n of ['submit', 'message', 'error', 'new-chat']) {
        chat.addEventListener('ai-chat:' + n, (e) => logEvent('ai-chat:' + n, e.detail));
      }

      /* =====================================================================
         BOOT
         ===================================================================== */
      buildPanel($('panel'), {
        state, get, set, isSet, DEFAULTS,
        onAction: (id) => ACTIONS[id]?.(),
        onPreset: (p) => {
          for (const k of Object.keys(state)) delete state[k];
          Object.assign(state, p.values);
          apply();
          buildPanel($('panel'), PANEL_CTX);   // re-sync the widgets
        },
        onScenario: (v) => { scenario = v; },
        onTransport: setTransport,
        getStatus: () => transportStatus,
      });
      const PANEL_CTX = {
        state, get, set, isSet, DEFAULTS,
        onAction: (id) => ACTIONS[id]?.(),
        onPreset: (p) => {
          for (const k of Object.keys(state)) delete state[k];
          Object.assign(state, p.values);
          apply();
          buildPanel($('panel'), PANEL_CTX);
        },
        onScenario: (v) => { scenario = v; },
        onTransport: setTransport,
        getStatus: () => transportStatus,
      };

      const ACTIONS = {
        seed: () => {
          chat.messages = [];
          chat.addMessage('user', 'Can you show me a code sample and a table?');
          chat.addMessage('assistant', SCENARIOS.sampleReply);
          commit(); drawHist();
        },
        long: () => {
          chat.messages = [];
          for (let i = 1; i <= 14; i++) {
            chat.addMessage('user', `Question number ${i} — does scrolling still behave?`);
            chat.addMessage('assistant', `Answer ${i}. Scroll up mid-stream and the view should stay put; the jump-to-latest button appears.`);
          }
          commit(); drawHist();
        },
        failNext: () => { pendingFail = true; chat.send('This request will fail — then hit Retry.'); },
        clear: () => chat.clear(),
        stop: () => chat.stop(),
        reset: () => { for (const k of Object.keys(state)) delete state[k]; apply(); buildPanel($('panel'), PANEL_CTX); },
      };

      // Page theme (independent of the component's own `theme` attribute)
      $('pgTheme').onclick = () => {
        const el = document.documentElement;
        el.dataset.pg = el.dataset.pg === 'dark' ? 'light' : 'dark';
      };
      $('copyCode').onclick = async () => {
        await navigator.clipboard.writeText($('codeOut').textContent);
        $('copyCode').textContent = 'Copied';
        setTimeout(() => ($('copyCode').textContent = 'Copy'), 1200);
      };

      apply();
      setTransport();
      ACTIONS.seed();
      drawHist();
      logEvent('ready', {});
      window.chat = chat;
    </script>
  </body>
</html>
