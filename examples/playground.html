<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ai-chat — customization playground</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #eceef2;
        color: #1a1a1a;
        display: grid;
        grid-template-columns: 320px 1fr;
        height: 100vh;
      }
      body.page-dark { background: #0a0b0f; color: #e6e6e6; }

      .panel {
        padding: 20px;
        overflow-y: auto;
        border-right: 1px solid #8883;
      }
      .panel h1 { font-size: 17px; margin: 0 0 4px; }
      .panel p.sub { margin: 0 0 16px; font-size: 12px; color: #888; }
      .group { margin-bottom: 18px; border-top: 1px solid #8882; padding-top: 12px; }
      .group h2 {
        font-size: 11px; text-transform: uppercase; letter-spacing: .06em;
        color: #888; margin: 0 0 10px;
      }
      label.row {
        display: flex; align-items: center; justify-content: space-between;
        gap: 10px; margin: 8px 0; font-size: 13px;
      }
      label.row input[type="text"], label.row select {
        flex: 1 1 auto; min-width: 0; max-width: 160px;
        padding: 6px 8px; border: 1px solid #8886; border-radius: 8px;
        background: transparent; color: inherit; font: inherit;
      }
      label.stack { display: block; margin: 8px 0; font-size: 13px; }
      label.stack input[type="text"] {
        width: 100%; margin-top: 4px;
        padding: 6px 8px; border: 1px solid #8886; border-radius: 8px;
        background: transparent; color: inherit; font: inherit;
      }
      input[type="range"] { width: 120px; }
      .val { font-variant-numeric: tabular-nums; color: #888; font-size: 12px; min-width: 34px; text-align: right; }
      button.reset {
        width: 100%; margin-top: 8px; padding: 8px; cursor: pointer;
        border: 1px solid #8886; border-radius: 8px; background: transparent;
        color: inherit; font: inherit;
      }

      .stage { display: grid; place-items: center; padding: 24px; overflow: auto; }
      .frame {
        width: 100%; max-width: 820px; height: min(82vh, 760px);
        overflow: hidden;
        background: var(--card, #fff);
      }

      /* ---- History sidebar demo styling (consumer-owned markup) ---- */
      .hist { display: flex; flex-direction: column; gap: 4px; }
      .hist button {
        text-align: left; padding: 8px 10px; border: none; border-radius: 8px;
        background: transparent; color: inherit; font: inherit; font-size: 13px;
        cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .hist button:hover { background: #8882; }
      .hist button.active { background: #8883; font-weight: 600; }
      .hist .hist__label {
        font-size: 11px; text-transform: uppercase; letter-spacing: .05em;
        color: #888; padding: 4px 10px; margin-top: 4px;
      }
      /* Demo tool button living in the composer's action slot. */
      .tool-btn {
        display: grid; place-items: center;
        width: 32px; height: 32px; padding: 0;
        border: none; border-radius: 8px; background: transparent;
        color: #888; cursor: pointer;
      }
      .tool-btn:hover { background: #8882; color: inherit; }
      body.page-dark .frame { --card: #0f1117; }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>Customization playground</h1>
      <p class="sub">Every control here maps to something a real user of the component can set. Toggle away.</p>

      <div class="group">
        <h2>Theme</h2>
        <label class="row">Theme
          <select id="theme">
            <option value="auto">auto (follows OS)</option>
            <option value="light" selected>light</option>
            <option value="dark">dark</option>
          </select>
        </label>
        <label class="row">Accent color
          <input type="color" id="accent" value="#4f46e5" />
        </label>
      </div>

      <div class="group">
        <h2>Names &amp; timestamps</h2>
        <label class="row">Show names <input type="checkbox" id="showNames" checked /></label>
        <label class="row">Show timestamps <input type="checkbox" id="showTimestamps" checked /></label>
        <label class="row">AI message in a bubble <input type="checkbox" id="assistantBubble" /></label>
        <label class="stack">Your name
          <input type="text" id="userName" value="You" />
        </label>
        <label class="stack">AI name
          <input type="text" id="assistantName" value="AI bot" />
        </label>
      </div>

      <div class="group">
        <h2>Chrome</h2>
        <label class="row">Show header <input type="checkbox" id="showHeader" /></label>
        <label class="row">Show new-chat button <input type="checkbox" id="showClear" checked /></label>
        <label class="row">Retry on error <input type="checkbox" id="showRetry" checked /></label>
        <label class="row">History sidebar <input type="checkbox" id="showAside" checked /></label>
        <label class="stack">Header title
          <input type="text" id="headerTitle" value="Chat" />
        </label>
        <button class="reset" id="triggerError" style="margin-top:4px">Simulate a failed reply</button>
      </div>

      <div class="group">
        <h2>Avatars</h2>
        <label class="row">Show avatars <input type="checkbox" id="showAvatars" /></label>
        <p class="sub" style="margin:4px 0 0">Uses simple text initials when on. Real apps drop in an &lt;img&gt; or SVG via a slot.</p>
      </div>

      <div class="group">
        <h2>Shape &amp; size</h2>
        <label class="row">Corner radius
          <span><input type="range" id="radius" min="0" max="28" value="8" /> <span class="val" id="radiusVal">8</span></span>
        </label>
        <label class="row">Border width
          <span><input type="range" id="border" min="0" max="3" value="1" /> <span class="val" id="borderVal">1</span></span>
        </label>
        <label class="row">Font size
          <span><input type="range" id="font" min="12" max="20" value="15" /> <span class="val" id="fontVal">15</span></span>
        </label>
      </div>

      <div class="group">
        <h2>Text</h2>
        <label class="stack">Placeholder
          <input type="text" id="placeholder" value="Send a message…" />
        </label>
        <label class="stack">Empty heading
          <input type="text" id="emptyHeading" value="How can I help?" />
        </label>
        <label class="stack">Empty body
          <input type="text" id="emptyBody" value="Ask me anything to get started." />
        </label>
      </div>

      <button class="reset" id="reset">Reset all</button>
    </div>

    <div class="stage">
      <div class="frame">
        <ai-chat id="chat" show-aside>
          <!-- The consumer owns this markup. The component just gives the slot. -->
          <div slot="aside" class="hist">
            <div class="hist__label">Conversations</div>
            <div id="histList"></div>
          </div>

          <!-- Future tools drop into these composer slots with no re-layout.
               Here's a placeholder "attach" button to show where they'd sit. -->
          <button slot="composer-actions-start" class="tool-btn" type="button"
                  title="Attach (demo placeholder)" aria-label="Attach">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round"
                 stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
          </button>
        </ai-chat>
      </div>
    </div>

    <script type="module">
      import { functionAdapter } from '../dist/ai-chat-element.js';

      const chat = document.getElementById('chat');
      const $ = (id) => document.getElementById(id);

      // Flip this to make the next reply fail (tests the retry button).
      let failNext = false;

      // Mock streaming transport — no API key needed for testing the UI.
      chat.transport = functionAdapter(async function* (messages) {
        if (failNext) {
          failNext = false;
          throw new Error('Simulated network error — hit Retry to resend.');
        }
        const q = messages[messages.length - 1]?.content ?? '';
        const reply =
          `You said: **${q}**\n\n` +
          `Here's a code block to test rendering and the copy button:\n\n` +
          '```js\n' +
          "const chat = document.querySelector('ai-chat');\n" +
          "chat.transport = openAIAdapter({ apiKey, model: 'gpt-4o-mini' });\n" +
          '```\n\n' +
          '- streaming works\n- markdown works\n- names & timestamps appear above';
        for (const w of reply.split(/(\s+)/)) {
          await new Promise((r) => setTimeout(r, 16));
          yield w;
        }
      });

      // Seed a couple of messages so names/timestamps/avatars are visible immediately.
      chat.addMessage('user', 'Hey, is this thing customizable?');
      chat.addMessage('assistant', 'Absolutely — **every** name, color, and toggle on the left is something a developer using this component controls.');

      // ---- Conversation history (CONSUMER-OWNED) --------------------------------
      // The component ships ONE conversation + an `aside` slot + a `new-chat`
      // event. YOU keep the list and storage. This is the whole pattern:
      let conversations = [
        { id: 1, title: 'Getting started', messages: [...chat.messages] },
      ];
      let activeId = 1;

      const histList = document.getElementById('histList');
      function renderHistory() {
        histList.innerHTML = '';
        for (const c of conversations) {
          const b = document.createElement('button');
          b.textContent = c.title;
          b.className = c.id === activeId ? 'active' : '';
          b.addEventListener('click', () => switchTo(c.id));
          histList.appendChild(b);
        }
      }
      function saveActive() {
        const c = conversations.find((c) => c.id === activeId);
        if (c) c.messages = [...chat.messages];
      }
      function switchTo(id) {
        saveActive();                 // stash the current conversation
        activeId = id;
        chat.messages = [...(conversations.find((c) => c.id === id)?.messages ?? [])];
        renderHistory();
      }

      // The component's New-chat button fires this. We save the old chat, add a
      // fresh conversation to our list, and let the component clear itself.
      chat.addEventListener('ai-chat:new-chat', () => {
        saveActive();
        const id = Date.now();
        const title = 'New conversation';
        conversations = [{ id, title, messages: [] }, ...conversations];
        activeId = id;
        renderHistory();              // component clears its own messages
      });

      // Give a new conversation a title from the first thing the user says.
      chat.addEventListener('ai-chat:submit', (e) => {
        const c = conversations.find((c) => c.id === activeId);
        if (c && (c.title === 'New conversation' || !c.title)) {
          c.title = e.detail.content.slice(0, 28);
          renderHistory();
        }
      });

      renderHistory();

      // ---- Avatar slots (added/removed by the toggle) ----
      function setAvatars(on) {
        chat.querySelectorAll('[slot]').forEach((el) => el.remove());
        if (!on) return;
        const a = document.createElement('span');
        a.slot = 'assistant-avatar'; a.textContent = 'AI';
        a.style.cssText = 'font-size:11px;font-weight:700';
        const u = document.createElement('span');
        u.slot = 'user-avatar'; u.textContent = 'ME';
        u.style.cssText = 'font-size:11px;font-weight:700';
        chat.append(a, u);
      }

      // ---- Wire every control ----
      function apply() {
        chat.setAttribute('theme', $('theme').value);
        document.body.classList.toggle('page-dark',
          $('theme').value === 'dark');

        chat.style.setProperty('--ai-chat-accent', $('accent').value);
        chat.style.setProperty('--ai-chat-radius', $('radius').value + 'px');
        chat.style.setProperty('--ai-chat-border-width', $('border').value + 'px');
        chat.style.setProperty('--ai-chat-input-border-width', $('border').value + 'px');
        chat.style.setProperty('--ai-chat-font-size', $('font').value + 'px');

        chat.showNames = $('showNames').checked;
        chat.showTimestamps = $('showTimestamps').checked;
        chat.assistantBubble = $('assistantBubble').checked;
        chat.showHeader = $('showHeader').checked;
        chat.showClear = $('showClear').checked;
        chat.showRetry = $('showRetry').checked;
        chat.showAside = $('showAside').checked;
        chat.placeholder = $('placeholder').value;
        chat.labels = {
          userName: $('userName').value,
          assistantName: $('assistantName').value,
          emptyHeading: $('emptyHeading').value,
          emptyBody: $('emptyBody').value,
          headerTitle: $('headerTitle').value,
        };

        setAvatars($('showAvatars').checked);

        $('radiusVal').textContent = $('radius').value;
        $('borderVal').textContent = $('border').value;
        $('fontVal').textContent = $('font').value;
      }

      // Attach listeners to all inputs.
      document.querySelectorAll('.panel input, .panel select').forEach((el) => {
        el.addEventListener('input', apply);
        el.addEventListener('change', apply);
      });

      $('reset').addEventListener('click', () => {
        location.reload();
      });

      // Arm a failure, then send a message for you so the retry UI shows up.
      $('triggerError').addEventListener('click', () => {
        failNext = true;
        chat.send('This one is going to fail.');
      });

      apply();
    </script>
  </body>
</html>
