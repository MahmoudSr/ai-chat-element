<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ai-chat — free local AI (Ollama)</title>
    <style>
      body {
        margin: 0; min-height: 100vh; box-sizing: border-box;
        font-family: system-ui, sans-serif;
        background: #f5f6f8; color: #1a1a1a;
        display: grid; place-items: center; padding: 24px;
      }
      @media (prefers-color-scheme: dark) { body { background: #0a0b0f; color: #e6e6e6; } }
      .card {
        width: 100%; max-width: 520px; height: min(85vh, 700px);
        overflow: hidden; background: #fff;
      }
      @media (prefers-color-scheme: dark) { .card { background: #0f1117; } }
      ai-chat { --ai-chat-accent: #16a34a; }
    </style>
  </head>
  <body>
    <div class="card">
      <ai-chat
        id="chat"
        theme="auto"
        placeholder="Ask your local model…"
        empty-heading="Local AI, zero cost"
        empty-body="Powered by Ollama running on your computer."
      ></ai-chat>
    </div>

    <script type="module">
      import { openAIAdapter } from '../dist/ai-chat-element.js';

      const chat = document.getElementById('chat');

      // Ollama exposes an OpenAI-compatible endpoint, so our openAIAdapter
      // works as-is. No apiKey needed for a local server.
      const MODEL = 'llama3.2'; // change to any model you've pulled

      chat.labels = { userName: 'You', assistantName: MODEL };
      chat.transport = openAIAdapter({
        model: MODEL,
        baseURL: 'http://localhost:11434/v1/chat/completions',
        // no apiKey — local server doesn't need one
      });

      // Errors go to the console so nothing clutters the chat UI.
      // If requests fail, make sure Ollama is running with:
      //   OLLAMA_ORIGINS=* ollama serve
      chat.addEventListener('ai-chat:error', (e) => {
        console.warn('[ai-chat] transport error:', e.detail.error);
      });
    </script>
  </body>
</html>
